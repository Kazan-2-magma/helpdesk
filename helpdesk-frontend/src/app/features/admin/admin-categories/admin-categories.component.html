<div class="flex flex-col h-screen px-6 pb-10 mb-80">
  <div
    class="rounded-2xl mb-5 border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]"
  >
    <div
      class="flex flex-col gap-4 px-6 mb-4 sm:flex-row sm:items-center sm:justify-between"
    >
      <div>
        <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
          Categories
        </h3>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <form>
            <div class="relative">
              <button
                class="absolute -translate-y-1/2 left-4 top-1/2"
                type="button"
              >
                <svg
                  class="fill-gray-500 dark:fill-gray-400"
                  width="20"
                  height="20"
                  viewBox="0 0 20 20"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    fill-rule="evenodd"
                    clip-rule="evenodd"
                    d="M3.04199 9.37381C3.04199 5.87712 5.87735 3.04218 9.37533 3.04218C12.8733 3.04218 15.7087 5.87712 15.7087 9.37381C15.7087 12.8705 12.8733 15.7055 9.37533 15.7055C5.87735 15.7055 3.04199 12.8705 3.04199 9.37381ZM9.37533 1.54218C5.04926 1.54218 1.54199 5.04835 1.54199 9.37381C1.54199 13.6993 5.04926 17.2055 9.37533 17.2055C11.2676 17.2055 13.0032 16.5346 14.3572 15.4178L17.1773 18.2381C17.4702 18.531 17.945 18.5311 18.2379 18.2382C18.5308 17.9453 18.5309 17.4704 18.238 17.1775L15.4182 14.3575C16.5367 13.0035 17.2087 11.2671 17.2087 9.37381C17.2087 5.04835 13.7014 1.54218 9.37533 1.54218Z"
                    fill=""
                  ></path>
                </svg>
              </button>
              <input
                type="text"
                placeholder="Search..."
                name="faqSearch"
                [(ngModel)]="searchText"
                (ngModelChange)="onSearchChange($event)"
                class="dark:bg-dark-900 h-[42px] w-full rounded-lg border border-gray-300 bg-transparent py-2.5 pl-[42px] pr-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-700 dark:bg-gray-900 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 xl:w-[300px]"
              />
            </div>
          </form>
        </div>

        <app-drawer
          buttonLabel="Add"
          (closed)="onDrawerClosed()"
          [drawerHeader]="formMode === 'add' ? 'Add' : 'Update'"
          [(visible)]="visible"
        >
          <form
            [formGroup]="categoryForm"
            (ngSubmit)="
              formMode === 'add'
                ? addCategory()
                : updateCategory(categoryToUpdate!)
            "
            class="max-w-lg mx-auto mt-10"
          >
            <div class="mb-5">
              <label
                for="name"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Category Name</label
              >
              <input
                type="text"
                formControlName="name"
                id="name"
                aria-describedby="helper-text-explanation"
                placeholder="Enter Category Name"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
              />
            </div>

            <div class="mb-5">
              <label
                for="description"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white"
                >Description</label
              >
              <textarea
                id="description"
                formControlName="description"
                rows="4"
                class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                placeholder="Enter description..."
              ></textarea>
            </div>

            <div class="mt-5 w-full">
              <button
                class="relative inline-flex items-center justify-center p-0.5 mb-2 me-2 overflow-hidden text-sm font-medium text-gray-900 rounded-lg group bg-gradient-to-br from-cyan-500 to-blue-500 group-hover:from-cyan-500 group-hover:to-blue-500 hover:text-white dark:text-white focus:ring-4 focus:outline-none focus:ring-cyan-200 dark:focus:ring-cyan-800"
              >
                <span
                  class="relative px-5 py-2.5 transition-all ease-in duration-75 bg-white dark:bg-gray-900 rounded-md group-hover:bg-transparent group-hover:dark:bg-transparent"
                >
                  {{ formMode === "add" ? "Add" : "Update" }}
                </span>
              </button>
            </div>
          </form>
        </app-drawer>
      </div>
    </div>
  </div>

  <div class="flex-1 pb-10 px-4">
    <app-basic-table-three
      [data]="(categories$ | async) ?? []"
      [loadingMore]="loadingMore"
      [fullLoading]="loading"
      (loadMore)="onLoadMore()"
    >
      <tr table-head>
        <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">
          Name
        </th>
        <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">
          Description
        </th>
        <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">
          Action
        </th>
      </tr>

      <tr class="px-4 py-3" *ngFor="let category of categories$ | async">
        <td class="px-4 py-3 text-gray-500 text-sm">{{ category.name }}</td>
        <td
          class="w-1/2 px-4 py-3 text-gray-500 text-sm text-balance overflow-y-auto wrap-anywhere break-all"
        >
          {{ category.name }}
        </td>
        <td class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400">
          <app-table-dropdown
            [dropDownContents]="dropDownContents"
            [data]="category"
          >
          </app-table-dropdown>
        </td>
      </tr>
    </app-basic-table-three>
  </div>
  <p-toast />
</div>
