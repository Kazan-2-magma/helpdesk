<div class="flex flex-col h-screen px-6 pb-10 mb-80 ">
    <!-- Header -->
    <div class="rounded-2xl mb-5 border border-gray-200 bg-white pt-4 dark:border-white/[0.05] dark:bg-white/[0.03]">

        <div class="flex flex-col gap-4 px-6 mb-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
                    Users
                </h3>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                    <form>
                        <app-input [(value)]="searchText" placeholder="Search..." (valueChange)="onValueChange($event)"
                            icon="search"></app-input>
                    </form>
                </div>

                <!-- Drawer -->
                <app-drawer
                    buttonLabel="Add" 
                    (closed)="onDrawerClosed()"
                    [drawerHeader]="formMode === 'add' ? 'Add Agent' : 'Update Agent'"
                    [(visible)]="visible">

                    <form [formGroup]="formGroup"
                        (ngSubmit)="formMode === 'add' ? addAgent() : updateAgent(agentToUpdate!)"
                        class="max-w-lg mx-auto mt-10">

                        <div class="mb-5">
                            <label for="username" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Agent Name</label>
                            <input type="text" formControlName="name" id="username"
                                aria-describedby="helper-text-explanation" placeholder="Enter User Name"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" />
                        </div>

                        <div class="mb-5">
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Agent
                                Email</label>
                            <input id="email" formControlName="email"
                                class="block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="Enter User Email..." />
                        </div>

                        <div class="mb-5">
                            <label for="password"
                                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
                            <input type="password" formControlName="password" id="password"
                                aria-describedby="helper-text-explanation" placeholder="Enter User Password"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" />
                        </div>
                        <div class="mb-5">
                            <label for="passwordConfirmation"
                                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password
                                Confirmation</label>
                            <input type="password" formControlName="password_confirmation" id="passwordConfirmation"
                                aria-describedby="helper-text-explanation" placeholder="Enter Password Confirmation"
                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5  dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" />
                        </div>

                        <span
                            *ngIf="formGroup.hasError('passwordMismatch') && formGroup.get('passwordConfirmation')?.touched"
                            class="text-red-500">Passwords must match</span>

                        <label for="roles" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Select
                            Role</label>
                        <select id="role" formControlName="role"
                            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                            <option value="" disabled selected>Select Role</option>
                            <option *ngFor="let role of roleList" [value]='role.value'> {{role.label}} </option>
                        </select>

                        <div class="mt-5 w-full">
                            <button type="submit"
                                class="relative inline-flex items-center justify-center p-0.5 mb-2 me-2 overflow-hidden text-sm font-medium text-gray-900 rounded-lg group bg-gradient-to-br from-cyan-500 to-blue-500 group-hover:from-cyan-500 group-hover:to-blue-500 hover:text-white dark:text-white focus:ring-4 focus:outline-none focus:ring-cyan-200 dark:focus:ring-cyan-800">
                                <span
                                    class="relative px-5 py-2.5 transition-all ease-in duration-75 bg-white dark:bg-gray-900 rounded-md group-hover:bg-transparent group-hover:dark:bg-transparent">
                                    {{ formMode === "add" ? 'Add' : 'Update' }}
                                </span>
                            </button>

                        </div>

                    </form>
                </app-drawer>

            </div>
        </div>
    </div>

    <!-- Table -->
    <app-basic-table-three [data]="(agents$ | async) ?? []" [loadingMore]="loadingMore" (loadMore)="onLoadMore()">
        
        <tr table-head>
            <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">ID</th>
            <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">User Info</th>
            <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">Role</th>
            <th class="py-3 px-4 text-left text-gray-500 text-sm font-normal">Action</th>
        </tr>

        <tr class="px-4 py-3" *ngFor="let agent of agents$ | async">
            <td class="px-4 py-3 text-gray-500 text-sm">{{ agent.id }}</td>
            <td class="px-4 sm:px-6 py-3.5">
                <div class="flex items-center gap-3">
                    <app-avatar-text [name]="agent.name" class="w-10 h-10" />
                    <div>
                        <span class="mb-0.5 block text-theme-sm font-medium text-gray-700 dark:text-gray-400">
                            {{ agent.name }}
                        </span>
                        <span class="text-gray-500 text-theme-sm dark:text-gray-400">
                            {{ agent.email }}
                        </span>
                    </div>
                </div>
            </td>
            <td class="w-1/2  px-4 py-3 text-gray-500 text-sm text-balance overflow-y-auto wrap-anywhere break-all">{{
                agent.role.toUpperCase() }}</td>
            <td class="px-4 py-4 text-gray-700 text-theme-sm dark:text-gray-400">
                <app-table-dropdown [dropDownContents]="dropDownContents" [data]="agent">
                </app-table-dropdown>
            </td>
        </tr>
    </app-basic-table-three>

    <p-toast />


</div>
