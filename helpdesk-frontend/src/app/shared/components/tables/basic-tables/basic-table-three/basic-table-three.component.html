<div class="overflow-y-auto border border-gray-200 rounded-2xl bg-white dark:border-white/[0.05] dark:bg-white/[0.03]"
     infiniteScroll [infiniteScrollDistance]="2"
     [infiniteScrollThrottle]="150" (scrolled)="onScrollDown()">
  
  <table class="min-w-full table-fixed">
    <thead class="sticky top-0 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-white/[0.05]">
      <ng-content select="[table-head]"></ng-content>
    </thead>

    <tbody class="divide-y divide-gray-100 dark:divide-white/[0.05]">
      <tr *ngIf="fullLoading">
        <td colspan="100%" class="py-20">
          <div class="flex flex-col justify-center items-center w-full gap-3">
            <p-progress-spinner strokeWidth="4" [style]="{ width: '40px', height: '40px' }" />
            <span class="text-sm text-gray-500">Loading data...</span>
          </div>
        </td>
      </tr>

      <ng-container *ngIf="!fullLoading">
        <ng-content></ng-content>
      </ng-container>

      <tr *ngIf="loadingMore" class="transition hover:bg-gray-50 dark:hover:bg-gray-900">
        <td colspan="100%" class="py-6">
          <div class="flex justify-center items-center w-full">
            <p-progress-spinner strokeWidth="5" fill="transparent" animationDuration=".5s"
              [style]="{ width: '25px', height: '25px' }" />
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
