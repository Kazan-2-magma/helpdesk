<div id="accordion-collapse">
    <div *ngFor="let item of items; let i = index">
        <h2>
            <button type="button"
                class="flex items-center justify-between w-full p-5 font-medium text-gray-500 border border-b-0 border-gray-200 rounded-t-xl focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-800 dark:border-gray-700 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 gap-3"
                (click)="toggle(i)" [attr.aria-expanded]="item.open">
                <span>{{ item.title }}</span>
                <svg [class.rotate-180]="item.open" class="w-3 h-3 shrink-0 transition-transform duration-300"
                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 10 6">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5 5 1 1 5" />
                </svg>
            </button>
        </h2>

        <div [class.hidden]="!item.open" class="p-5 border border-b-0 border-gray-200 dark:border-gray-700">
            <div [innerHTML]="item.content"></div>
        </div>
    </div>
</div>
